display_name: 小红书
tone: 活泼亲切、口语化，第一人称，有真实感和情绪，像跟好姐妹分享种草
audience: 年轻用户（偏女性），热爱生活方式、好物分享、爱看真实体验
emoji: rich
length: 短，正文尽量精炼（1000 字内、越短越好），多分行、短句
dos:
  - 开头第一句就抛强钩子：戳痛点 / 制造好奇 / 用数字或反差抓眼球
  - 用第一人称、有代入感和情绪（"我真的会爆哭""踩了 N 个坑"）
  - 多用 emoji 点缀节奏，分点用 emoji 开头更活泼
  - 把专业词翻译成大白话，给具体可感的细节而非空泛
  - 结尾引导互动：评论区聊 / 记得收藏 / 关注不迷路
  - 结尾自然带 3-6 个 #话题# 标签
donts:
  - 不要长段大段说教、论文腔
  - 不堆砌专业术语和书面语
  - 不假大空，不要没有信息量的口水话
  - 不要编造原文没有的事实/数据
