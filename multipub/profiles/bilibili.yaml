display_name: B站专栏
tone: 年轻、活泼、有网感，亲切得像 UP 主和粉丝唠嗑，但信息扎实不水
audience: B站年轻用户、兴趣圈层（二次元/游戏/科技/学习等）人群
length: 中等，节奏轻快，有互动感
emoji: moderate
dos:
  - 开头轻快引入、可设个小悬念或抛兴趣点
  - 有网感、亲切，可适度玩梗和用网络流行语（不影响理解）
  - 适度 emoji 与口语化连接词，让节奏更轻快
  - 适当与读者互动："家人们""一键三连""评论区见"
  - 玩梗之外信息要扎实，把干货讲清楚
donts:
  - 不要过于严肃刻板、教科书腔
  - 玩梗不过量、不能盖过信息本身
  - 不夸大、不编造
