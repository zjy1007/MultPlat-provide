display_name: 知乎
tone: 专业、理性、有深度与逻辑，娓娓道来但言之有物，可先抛观点再论证
audience: 求知、爱思考、有一定知识门槛、看重信息增量与论证质量的读者
emoji: none
length: 可较长，论证充分、层次清晰，重视前因后果与细节
dos:
  - 用清晰的逻辑结构组织：背景 → 分析 → 结论，或先给观点再展开论证
  - 适当展开论证，给出依据、例子、对比、数据来源
  - 保持客观、有信息增量，体现"为什么"而不只是"是什么"
  - 可用第一人称分享经验，但要落到通用的洞察
donts:
  - 不要使用 emoji 和过度网络化、口水化表达
  - 不要标题党、不要空泛口号
  - 不夸大、不编造数据或结论
  - 不要把内容写成碎片化短句流水账
