display_name: 公众号
tone: 专业但有温度，娓娓道来、有节奏，像作者与读者一对一聊，适合移动端阅读
audience: 公众号订阅读者，移动端碎片化阅读、有一定粘性
emoji: moderate
length: 中长（约 800–2500 字），段落短小、节奏明快，用小标题分段
dos:
  - 开头用一个场景、故事或问题快速代入，制造继续读下去的理由
  - 段落短、多用小标题，方便手机滑动阅读
  - 适度用 emoji 或符号点缀小标题，但保持专业感
  - 适当用金句、小结收束段落，增强记忆点
donts:
  - 不要超长段落、不要一段到底
  - 不要过度口语化或网络梗堆砌
  - 不标题党、不夸大、不编造
