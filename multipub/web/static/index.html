<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MultiPub · 多平台内容发布工具</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; color: #1f1f1f; height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 16px; padding: 10px 18px; border-bottom: 1px solid #eee; flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0; color: #07c160; white-space: nowrap; }
  header .sub { font-size: 12px; color: #999; }
  .platforms { display: flex; gap: 12px; flex-wrap: wrap; }
  .platforms label { font-size: 13px; cursor: pointer; user-select: none; }
  .spacer { flex: 1; }
  button { font-size: 13px; padding: 7px 14px; border-radius: 5px; border: 1px solid #07c160; background: #07c160; color: #fff; cursor: pointer; }
  button.ghost { background: #fff; color: #07c160; }
  button:disabled { opacity: .5; cursor: default; }
  #status { font-size: 12px; color: #888; min-width: 80px; }

  main { flex: 1; display: flex; min-height: 0; }
  .pane { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .pane.left { border-right: 1px solid #eee; }
  .pane h2 { font-size: 12px; color: #999; margin: 0; padding: 8px 14px; border-bottom: 1px solid #f2f2f2; font-weight: 500; }
  #editor { flex: 1; border: none; outline: none; resize: none; padding: 16px; font-family: "SF Mono", Menlo, monospace; font-size: 13px; line-height: 1.7; }

  .tabs { display: flex; gap: 4px; padding: 8px 12px 0; flex-wrap: wrap; }
  .tab { font-size: 13px; padding: 6px 12px; border: 1px solid #e5e5e5; border-bottom: none; border-radius: 6px 6px 0 0; background: #fafafa; cursor: pointer; color: #555; }
  .tab.active { background: #fff; color: #07c160; font-weight: 600; border-color: #07c160; }
  .tab .badge { display: inline-block; min-width: 8px; height: 8px; border-radius: 50%; margin-left: 5px; }
  .tab .badge.warn { background: #faad14; }
  .preview-wrap { flex: 1; overflow: auto; padding: 14px; background: #f7f8fa; }
  .meta { font-size: 12px; color: #888; margin-bottom: 8px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .meta .count.over { color: #e34d59; font-weight: 600; }
  .warnings { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 5px; padding: 8px 12px; font-size: 12px; color: #874d00; margin-bottom: 10px; }
  .warnings ul { margin: 4px 0 0; padding-left: 18px; }
  .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
  .card .title { font-size: 17px; font-weight: 700; padding: 14px 16px 0; }
  iframe.html-preview { width: 100%; border: none; background: #fff; }
  pre.text-preview { white-space: pre-wrap; word-break: break-word; font-family: -apple-system, "PingFang SC", sans-serif; font-size: 14px; line-height: 1.7; padding: 16px; margin: 0; }
  .receipt { font-size: 12px; padding: 8px 12px; border-radius: 5px; margin-bottom: 10px; }
  .receipt.ok { background: #f0f9eb; border: 1px solid #c2e7b0; color: #3a7a1f; }
  .toolbar { display: flex; gap: 8px; padding: 8px 0 0; }
</style>
</head>
<body>
<header>
  <h1>MultiPub</h1>
  <span class="sub">一次写作 · 多平台适配 · 模拟发布</span>
  <div class="platforms" id="platforms"></div>
  <div class="spacer"></div>
  <span id="status"></span>
  <button id="publishBtn">一键模拟发布</button>
</header>

<main>
  <section class="pane left">
    <h2>Markdown 编辑器</h2>
    <textarea id="editor" spellcheck="false"></textarea>
  </section>
  <section class="pane right">
    <h2>多平台实时预览</h2>
    <div class="tabs" id="tabs"></div>
    <div class="preview-wrap" id="preview"></div>
  </section>
</main>

<script src="/static/app.js"></script>
</body>
</html>
