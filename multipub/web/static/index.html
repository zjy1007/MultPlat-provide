<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MultiPub · 多平台内容发布工具</title>
<style>
  /* ---- design tokens ---- */
  :root {
    --brand: #5b5bd6; --brand-600: #4f47cc; --brand-50: #eef0fb;
    --wechat: #07c160; --xiaohongshu: #ff2442; --zhihu: #0084ff; --bilibili: #fb7299;
    --ink: #1f2329; --ink-2: #5a6472; --ink-3: #97a0b0;
    --line: #eaecf0; --line-2: #f4f6f8;
    --bg-soft: #f6f7f9;
    --ok: #1a7a43; --ok-bg: #eaf7ef; --ok-border: #c2e7cf;
    --warn: #8a5a00; --warn-bg: #fff8e6; --warn-border: #ffe2a8;
    --style: #9e1068; --style-bg: #fff0f6; --style-border: #ffc7e0;
    --r-sm: 6px; --r: 8px; --r-lg: 12px; --r-pill: 999px;
    --sh-sm: 0 1px 2px rgba(16,24,40,.05);
    --sh: 0 6px 20px rgba(16,24,40,.08);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; color: var(--ink); background: #fff; height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

  /* ---- header ---- */
  header { display: flex; align-items: center; gap: 14px; padding: 12px 20px; border-bottom: 1px solid var(--line); flex-wrap: wrap; background: #fff; }
  header h1 { display: flex; align-items: center; gap: 9px; font-size: 18px; margin: 0; color: var(--ink); white-space: nowrap; font-weight: 700; letter-spacing: -.2px; }
  header h1::before { content: ""; width: 22px; height: 22px; border-radius: 7px; background: linear-gradient(135deg, var(--brand), #8b7cf0); box-shadow: var(--sh-sm); }
  header .sub { font-size: 12px; color: var(--ink-3); }
  .platforms { display: flex; gap: 8px; flex-wrap: wrap; padding-left: 14px; border-left: 1px solid var(--line); }
  .platforms label { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; padding: 5px 12px; border-radius: var(--r-pill); border: 1px solid var(--line); color: var(--ink-2); background: #fff; cursor: pointer; user-select: none; transition: all .15s ease; }
  .platforms label:hover { border-color: var(--ink-3); }
  .platforms label input { position: absolute; opacity: 0; width: 0; height: 0; }
  .platforms label::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--pc, var(--ink-3)); flex: none; }
  .platforms label:has(input[data-name="wechat"])      { --pc: var(--wechat); }
  .platforms label:has(input[data-name="xiaohongshu"]) { --pc: var(--xiaohongshu); }
  .platforms label:has(input[data-name="zhihu"])       { --pc: var(--zhihu); }
  .platforms label:has(input[data-name="bilibili"])    { --pc: var(--bilibili); }
  .platforms label:has(input:checked) { border-color: var(--pc, var(--brand)); color: var(--pc, var(--brand)); background: color-mix(in srgb, var(--pc, var(--brand)) 9%, #fff); font-weight: 600; }
  .spacer { flex: 1; }
  button { font-size: 13px; padding: 8px 16px; border-radius: var(--r-sm); border: 1px solid var(--brand); background: var(--brand); color: #fff; cursor: pointer; font-weight: 600; transition: all .15s ease; }
  button:hover { background: var(--brand-600); border-color: var(--brand-600); }
  button.ghost { background: #fff; color: var(--ink-2); border-color: var(--line); font-weight: 500; }
  button.ghost:hover { background: var(--bg-soft); color: var(--brand); border-color: var(--brand); }
  button:disabled { opacity: .5; cursor: default; }
  #status { font-size: 12px; color: var(--ink-3); min-width: 80px; }

  /* ---- layout ---- */
  main { flex: 1; display: flex; min-height: 0; }
  .pane { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .pane.left { border-right: 1px solid var(--line); background: var(--bg-soft); }
  .pane h2 { font-size: 11px; letter-spacing: .4px; text-transform: uppercase; color: var(--ink-3); margin: 0; padding: 10px 16px; border-bottom: 1px solid var(--line-2); font-weight: 600; background: #fff; }
  /* 编辑器做成白底卡片，与右侧预览卡片对称；浮在 pane 的浅灰底上 */
  #editor { flex: 1; outline: none; resize: none; margin: 14px; padding: 16px; border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--sh-sm); background: #fff; font-family: "SF Mono", Menlo, ui-monospace, monospace; font-size: 13px; line-height: 1.75; color: var(--ink); transition: border-color .15s ease, box-shadow .15s ease; }
  #editor:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-50); }

  /* ---- preview tabs ---- */
  .tabs { display: flex; gap: 6px; padding: 10px 14px 0; flex-wrap: wrap; }
  .tab { display: inline-flex; align-items: center; font-size: 13px; padding: 7px 14px; border: 1px solid var(--line); border-radius: var(--r-sm) var(--r-sm) 0 0; background: var(--bg-soft); cursor: pointer; color: var(--ink-2); transition: color .15s, border-color .15s; }
  .tab:hover { color: var(--ink); }
  .tab[data-name="wechat"]      { --pc: var(--wechat); }
  .tab[data-name="xiaohongshu"] { --pc: var(--xiaohongshu); }
  .tab[data-name="zhihu"]       { --pc: var(--zhihu); }
  .tab[data-name="bilibili"]    { --pc: var(--bilibili); }
  .tab.active { background: #fff; color: var(--pc, var(--brand)); font-weight: 600; border-color: var(--line); border-bottom: 2px solid var(--pc, var(--brand)); margin-bottom: -1px; }
  .tab .badge { display: inline-block; min-width: 7px; height: 7px; border-radius: 50%; margin-left: 6px; }
  .tab .badge.warn { background: #faad14; }

  /* ---- preview body ---- */
  .preview-wrap { flex: 1; overflow: auto; padding: 18px; background: var(--bg-soft); }
  .meta { font-size: 12px; color: var(--ink-2); margin-bottom: 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .meta > span { background: #fff; border: 1px solid var(--line); border-radius: var(--r-pill); padding: 4px 11px; line-height: 1.4; }
  .meta .count.over { color: #fff; background: var(--xiaohongshu); border-color: var(--xiaohongshu); font-weight: 600; }

  /* ---- info strips (receipt / warnings / style) share one system ---- */
  .receipt, .warnings, .style-panel { font-size: 12px; line-height: 1.6; padding: 10px 14px; border-radius: var(--r); border: 1px solid; margin-bottom: 12px; }
  .receipt.ok { background: var(--ok-bg); border-color: var(--ok-border); color: var(--ok); }
  .warnings { background: var(--warn-bg); border-color: var(--warn-border); color: var(--warn); }
  .warnings ul { margin: 4px 0 0; padding-left: 18px; }
  .style-panel { background: var(--style-bg); border-color: var(--style-border); color: var(--style); }
  .style-panel details { margin-top: 6px; }
  .style-panel summary { cursor: pointer; font-weight: 600; }

  /* ---- result card ---- */
  .card { background: #fff; border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--sh); overflow: hidden; }
  .card .title { font-size: 17px; font-weight: 700; padding: 14px 16px 0; }
  iframe.html-preview { width: 100%; border: none; background: #fff; display: block; }
  pre.text-preview { white-space: pre-wrap; word-break: break-word; font-family: -apple-system, "PingFang SC", sans-serif; font-size: 14px; line-height: 1.75; padding: 18px; margin: 0; color: var(--ink); }

  /* ---- toolbar ---- */
  .toolbar { display: flex; gap: 8px; padding: 12px 0 4px; }

  /* ---- image manifest ---- */
  .manifest { margin-top: 12px; background: #fff; border: 1px solid var(--line); border-radius: var(--r); padding: 10px 14px; }
  .manifest-head { font-size: 13px; font-weight: 600; color: var(--ink-2); display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .manifest ul { list-style: none; margin: 0; padding: 0; }
  .manifest li { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-top: 1px solid var(--line-2); font-size: 12px; }
  .img-no { color: var(--brand); font-weight: 600; white-space: nowrap; }
  .img-thumb { width: 36px; height: 36px; object-fit: cover; border-radius: var(--r-sm); background: var(--bg-soft); flex: none; }
  .img-thumb.none { display: inline-flex; align-items: center; justify-content: center; color: var(--ink-3); font-size: 11px; }
  .img-alt { flex: 1; min-width: 0; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .img-tag { font-size: 11px; padding: 2px 9px; border-radius: var(--r-pill); white-space: nowrap; border: 1px solid; }
  .img-tag.manual { background: var(--warn-bg); color: var(--warn); border-color: var(--warn-border); }
  .img-tag.auto { background: var(--ok-bg); color: var(--ok); border-color: var(--ok-border); }
  .link-copy { font-size: 11px; padding: 4px 9px; background: #fff; color: var(--ink-2); border: 1px solid var(--line); border-radius: var(--r-sm); font-weight: 500; }
  .link-copy:hover { color: var(--brand); border-color: var(--brand); background: #fff; }
  button.mini { font-size: 11px; padding: 3px 9px; }

  /* ---- LLM 设置栏 ---- */
  #llm-bar { display: flex; align-items: center; gap: 8px; padding: 8px 20px; border-bottom: 1px solid var(--line); background: var(--style-bg); flex-wrap: wrap; }
  #llm-bar .llm-label { font-size: 12px; font-weight: 600; color: var(--style); white-space: nowrap; }
  #llm-bar select, #llm-bar input { font-size: 12px; padding: 6px 9px; border: 1px solid var(--style-border); border-radius: var(--r-sm); background: #fff; color: var(--ink); }
  #llm-bar #llm-key { flex: 1; min-width: 200px; }
  #llm-bar #llm-model { width: 170px; }
  #llm-bar .llm-hint { font-size: 11px; color: var(--ink-3); }
</style>
</head>
<body>
<header>
  <h1>MultiPub</h1>
  <span class="sub">一次写作 · 多平台适配 · 模拟发布</span>
  <div class="platforms" id="platforms"></div>
  <div class="spacer"></div>
  <span id="status"></span>
  <button id="publishBtn">一键模拟发布</button>
</header>

<div id="llm-bar">
  <span class="llm-label">✨ LLM 风格适配</span>
  <select id="llm-provider"></select>
  <input id="llm-key" type="password" placeholder="在此粘贴 API key（仅存于本浏览器，不上传服务器存储）" autocomplete="off" />
  <input id="llm-model" type="text" placeholder="模型（留空用默认）" />
  <span id="llm-hint" class="llm-hint"></span>
</div>

<main>
  <section class="pane left">
    <h2>Markdown 编辑器</h2>
    <textarea id="editor" spellcheck="false"></textarea>
  </section>
  <section class="pane right">
    <h2>多平台实时预览</h2>
    <div class="tabs" id="tabs"></div>
    <div class="preview-wrap" id="preview"></div>
  </section>
</main>

<script src="/static/app.js"></script>
</body>
</html>
